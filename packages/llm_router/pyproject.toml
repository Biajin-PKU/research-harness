[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llm-router"
version = "0.1.0"
description = "Pluggable multi-provider LLM router with tier-based task routing"
requires-python = ">=3.10"
license = "MIT"
dependencies = []

[project.optional-dependencies]
openai = [
  "openai>=1.0.0",
]
anthropic = [
  "anthropic>=0.40.0",
]
all = [
  "openai>=1.0.0",
  "anthropic>=0.40.0",
]
dev = [
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "ruff>=0.11.0",
  "openai>=1.0.0",
  "anthropic>=0.40.0",
]

[tool.hatch.build.targets.wheel]
packages = ["llm_router"]
