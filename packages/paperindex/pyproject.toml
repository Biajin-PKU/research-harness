[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "paperindex"
version = "0.1.0"
description = "Paper understanding engine: PDF -> structure -> knowledge fragments"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
  "pymupdf>=1.24.0",
  "PyPDF2>=3.0.0",
  "pyyaml>=6.0",
  "tiktoken>=0.7.0",
  "click>=8.1",
  "llm-router>=0.1.0",
]

[project.optional-dependencies]
llm = [
  "openai>=1.0.0",
]
tables = [
  "pdfplumber>=0.11.0",
]
dev = [
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "ruff>=0.11.0",
  "pdfplumber>=0.11.0",
  "openai>=1.0.0",
]

[project.scripts]
paperindex = "paperindex.cli:main"
