[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "research-harness"
version = "0.1.0"
description = "Agent-first research workflow platform"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
  "click>=8.1",
  "rich>=13.0",
  "anthropic>=0.40.0",
  "openai>=1.0.0",
  "httpx>=0.27.0",
]

[project.optional-dependencies]
paperindex = [
  "paperindex>=0.1.0",
]
fal = [
  "fal-client>=0.5.0",
]
dev = [
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "ruff>=0.11.0",
]

[project.scripts]
rh = "research_harness.cli:main"
research-harness = "research_harness.cli:main"
claude-admin = "research_harness.claude_admin:main"
